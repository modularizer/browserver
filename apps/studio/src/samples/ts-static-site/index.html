<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>My Static Site</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <img class="hero-badge" src="badge.png" alt="Static site demo badge">
    <h1>Hello from plat!</h1>
    <p>This page is served as a static file from a client-side server.</p>
    <p>The <code>StaticFolder</code> class makes all workspace files available at the root URL.</p>
    <button onclick="checkHealth()">Check Health</button>
    <pre id="result"></pre>
  </div>
  <script>
    async function checkHealth() {
      const res = await fetch('/health', { method: 'POST' })
      const data = await res.json()
      document.getElementById('result').textContent = JSON.stringify(data, null, 2)
    }
  </script>
</body>
</html>
