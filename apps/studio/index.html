<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" sizes="120x120" href="/favicon-120.svg" />
    <link rel="icon" type="image/png" sizes="120x120" href="/favicon-120.png" />
    <title>browserver</title>
    <script type="importmap">
      {
        "imports": {
          "@modularizer/plat-client/client-server": "%BASE_URL%plat-client-server-module.js"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Compute baseUrl, siteViewerBaseUrl, and serverName from the current location
      (function() {
        // Example logic, adjust as needed for your routing:
        var path = window.location.pathname.replace(/\/+$/, '');
        var segments = path.split('/').filter(Boolean);
        // Assume serverName is the first segment, siteViewerBaseUrl is up to that
        var serverName = segments[0] || '';
        var siteViewerBaseUrl = window.location.origin + '/';
        var baseUrl = window.location.origin + (segments.length ? '/' + serverName : '');
        window.baseUrl = baseUrl;
        window.siteViewerBaseUrl = siteViewerBaseUrl;
        window.serverName = serverName;
      })();
    </script>
  </body>
</html>
