<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/sample-favicon.svg" />
    <title>SITE VIEWER [READY]</title>
    <!-- SITE-VIEWER-BOOTSTRAP-V2 -->
    <style>
      html, body { margin: 0; height: 100%; 
        background: radial-gradient(circle at center, #001830 0%, #000 70%, #000 100%);
        color: #888;
        font-family: system-ui, sans-serif;
        animation: pulseGradient 3s ease-in-out infinite alternate;
      }
      #bootstrap { 
        position: fixed; inset: 0; display: flex; align-items: center;
        justify-content: center; flex-direction: column; gap: 0.5rem; font-size: 0.9rem;
        opacity: 0 !important;
        visibility: hidden !important;
        animation: fadeInText 0.5s ease-in 2s forwards !important;
      }
      #bootstrap.error { 
        color: #e55 !important; 
        opacity: 1 !important; 
        visibility: visible !important; 
        animation: none !important; 
      }
      
      @keyframes pulseGradient {
        from { filter: brightness(0.7); }
        to { filter: brightness(1.3); }
      }
      @keyframes fadeInText {
        from { opacity: 0; visibility: visible; }
        to { opacity: 1; visibility: visible; }
      }
    </style>
    <script>
      (function() {
        try {
          // 1. Fast-parse serverName from URL
          var path = window.location.pathname;
          var parts = path.split('/').filter(Boolean);
          if (parts.length < 2) return;
          var serverName = parts[0] + '/' + parts[1];
          var serverKey = 'sv:' + serverName;
          
          // 2. Synchronous LocalStorage check
          var cachedHtml = localStorage.getItem(serverKey + ':html');
          if (cachedHtml && !window.__siteViewerHasRendered) {
             window.__siteViewerHasRendered = true;
             console.log('[site-viewer] inline bootstrap: rendering from localStorage');
             
             // 3. Inject progress bar and sanitize scripts
             var duration = 10000;
             var storedDuration = sessionStorage.getItem(serverKey + ':dur');
             if (storedDuration) duration = parseInt(storedDuration, 10);
             
             var barStyle = '#site-viewer-progress-bar { position: fixed; bottom: 0; left: 0; height: 4px; background: #0078d4; z-index: 2147483647; width: 0%; pointer-events: none; animation: site-viewer-progress ' + duration + 'ms linear forwards; } @keyframes site-viewer-progress { 0% { width: 0%; } 100% { width: 90%; } }';
             var barHtml = '<div id="site-viewer-progress-bar"></div>';
             
             var finalHtml = cachedHtml
               .replace(/<script\b([^>]*\bsrc\s*=[^>]*)/gi, function(match) {
                 if (match.toLowerCase().indexOf('tailwindcss') !== -1) return match;
                 return match.replace('<script', '<script async');
               })
               .replace('</head>', '<style>' + barStyle + '</style></head>')
               .replace('<body>', '<body>' + barHtml);
             
             if (finalHtml === cachedHtml) {
               finalHtml = '<style>' + barStyle + '</style>' + barHtml + cachedHtml;
             }
             
             document.open();
             document.write(finalHtml);
             document.close();
          }
        } catch (e) {
          console.error('[site-viewer] inline bootstrap failed:', e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="bootstrap"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
